<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сводка за {{ summary.date }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">&larr; Все сводки</a>
        <h1>Сводка за {{ summary.date }}</h1>
        <div class="meta">
            {{ summary.message_count }} сообщений обработано
            {% if summary.summary_type == 'daily' %}
                <span class="badge badge-daily">Ежедневная</span>
            {% else %}
                <span class="badge badge-manual">Ручная</span>
            {% endif %}
        </div>
        <div class="content">
            {{ html_content | safe }}
        </div>
    </div>

    <!-- Плавающая кнопка чата -->
    <button id="chat-toggle" class="chat-toggle" aria-label="Открыть чат">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
    </button>

    <!-- Окно чата -->
    <div id="chat-panel" class="chat-panel hidden">
        <div class="chat-header">
            <span class="chat-header-title">Спросить по сводке</span>
            <button id="chat-close" class="chat-close" aria-label="Закрыть">&times;</button>
        </div>
        <div id="chat-messages" class="chat-messages">
            <div class="chat-welcome">
                Задайте вопрос по сводке или о любой упомянутой теме
            </div>
        </div>
        <form id="chat-form" class="chat-input-area">
            <textarea id="chat-input" rows="1" placeholder="Напишите вопрос..." maxlength="500"></textarea>
            <button type="submit" id="chat-btn" class="chat-send" aria-label="Отправить">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </form>
    </div>

    <script>
    (function() {
        const toggle = document.getElementById('chat-toggle');
        const panel = document.getElementById('chat-panel');
        const closeBtn = document.getElementById('chat-close');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('chat-input');
        const btn = document.getElementById('chat-btn');
        const messages = document.getElementById('chat-messages');
        const summaryId = {{ summary.id }};

        toggle.addEventListener('click', () => {
            panel.classList.remove('hidden');
            toggle.classList.add('hidden');
            input.focus();
        });

        closeBtn.addEventListener('click', () => {
            panel.classList.add('hidden');
            toggle.classList.remove('hidden');
        });

        // Автоматическая высота textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 100) + 'px';
        });

        // Enter отправляет, Shift+Enter — перенос строки
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });

        function addMessage(text, type) {
            // Убираем welcome если есть
            const welcome = messages.querySelector('.chat-welcome');
            if (welcome) welcome.remove();

            const msg = document.createElement('div');
            msg.className = 'chat-msg chat-msg-' + type;
            msg.textContent = text;
            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;
            return msg;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const q = input.value.trim();
            if (!q) return;

            // Очищаем прошлую пару Q&A
            messages.querySelectorAll('.chat-msg').forEach(el => el.remove());

            addMessage(q, 'user');
            input.value = '';
            input.style.height = 'auto';

            btn.disabled = true;
            const thinking = addMessage('Думаю...', 'thinking');

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({summary_id: summaryId, question: q})
                });
                const data = await res.json();
                thinking.remove();
                if (data.error) {
                    addMessage(data.error, 'error');
                } else {
                    addMessage(data.answer, 'assistant');
                }
            } catch (err) {
                thinking.remove();
                addMessage('Ошибка соединения', 'error');
            }

            btn.disabled = false;
            input.focus();
        });
    })();
    </script>
</body>
</html>
