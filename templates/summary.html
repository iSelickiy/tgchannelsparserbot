<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сводка за {{ summary.date }}</title>
    <link rel="stylesheet" href="/static/style.css?v=4">
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">&larr; Все сводки</a>
        <h1>Сводка за {{ summary.date }}</h1>
        <div class="meta">
            {{ summary.message_count }} сообщений обработано
            {% if summary.summary_type == 'daily' %}
                <span class="badge badge-daily">Ежедневная</span>
            {% else %}
                <span class="badge badge-manual">Ручная</span>
            {% endif %}
        </div>
        <div class="content">
            {{ html_content | safe }}
        </div>

        <!-- Чат по сводке -->
        <div class="chat-section">
            <div class="chat-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>Спросить по сводке</span>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div class="chat-welcome">Задайте вопрос по сводке или о любой упомянутой теме</div>
            </div>
            <form id="chat-form" class="chat-form">
                <input type="text" id="chat-input" placeholder="Например: что за ошибки нашли в Firefox?" maxlength="500" autocomplete="off">
                <button type="submit" id="chat-btn" class="chat-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
    (function() {
        var form = document.getElementById('chat-form');
        var input = document.getElementById('chat-input');
        var btn = document.getElementById('chat-btn');
        var messages = document.getElementById('chat-messages');
        var summaryId = {{ summary.id }};

        function addBubble(content, type, isHtml) {
            // Убираем welcome
            var welcome = messages.querySelector('.chat-welcome');
            if (welcome) welcome.remove();

            var bubble = document.createElement('div');
            bubble.className = 'chat-bubble chat-bubble-' + type;
            if (isHtml) {
                bubble.innerHTML = content;
            } else {
                bubble.textContent = content;
            }
            messages.appendChild(bubble);
            messages.scrollTop = messages.scrollHeight;
            return bubble;
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var q = input.value.trim();
            if (!q || btn.disabled) return;

            addBubble(q, 'user', false);
            input.value = '';
            btn.disabled = true;

            var thinking = addBubble('Думаю...', 'thinking', false);

            fetch('/api/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({summary_id: summaryId, question: q})
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                thinking.remove();
                if (data.error) {
                    addBubble(data.error, 'error', false);
                } else {
                    addBubble(data.answer_html || data.answer, 'assistant', !!data.answer_html);
                }
            })
            .catch(function() {
                thinking.remove();
                addBubble('Ошибка соединения', 'error', false);
            })
            .finally(function() {
                btn.disabled = false;
                input.focus();
            });
        });
    })();
    </script>
</body>
</html>
