<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сводка за {{ summary.date }}</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">&larr; Все сводки</a>
        <h1>Сводка за {{ summary.date }}</h1>
        <div class="meta">
            {{ summary.message_count }} сообщений обработано
            {% if summary.summary_type == 'daily' %}
                <span class="badge badge-daily">Ежедневная</span>
            {% else %}
                <span class="badge badge-manual">Ручная</span>
            {% endif %}
        </div>
        <div class="content">
            {{ html_content | safe }}
        </div>

        <!-- Чат по сводке -->
        <div class="chat-section">
            <div class="chat-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>Спросить по сводке</span>
            </div>
            <div id="chat-answer" class="chat-answer"></div>
            <form id="chat-form" class="chat-form">
                <input type="text" id="chat-input" placeholder="Например: что за ошибки нашли в Firefox?" maxlength="500" autocomplete="off">
                <button type="submit" id="chat-btn" class="chat-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
    (function() {
        var form = document.getElementById('chat-form');
        var input = document.getElementById('chat-input');
        var btn = document.getElementById('chat-btn');
        var answerEl = document.getElementById('chat-answer');
        var summaryId = {{ summary.id }};

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var q = input.value.trim();
            if (!q || btn.disabled) return;

            btn.disabled = true;
            answerEl.className = 'chat-answer chat-answer-loading';
            answerEl.textContent = 'Думаю...';
            answerEl.style.display = 'block';

            fetch('/api/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({summary_id: summaryId, question: q})
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.error) {
                    answerEl.className = 'chat-answer chat-answer-error';
                    answerEl.textContent = data.error;
                } else {
                    answerEl.className = 'chat-answer chat-answer-ok';
                    answerEl.textContent = data.answer;
                }
            })
            .catch(function() {
                answerEl.className = 'chat-answer chat-answer-error';
                answerEl.textContent = 'Ошибка соединения';
            })
            .finally(function() {
                btn.disabled = false;
            });
        });
    })();
    </script>
</body>
</html>
